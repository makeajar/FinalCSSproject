<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Success!</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8e0ff 0%, #70cad1 40%, #003366 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Georgia, serif;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .success {
            background: rgba(255, 255, 255, 0.88);
            padding: 48px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(255, 100, 150, 0.2);
        }

        .success-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff4d6d;
        }

        .success-sub {
            margin-top: 12px;
            font-size: 1.2rem;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="success">
        <p class="success-text">YAY!! I knew you wouldn't let me down! 🎉</p>
        <p class="success-sub">You're the goat!!!</p>
    </div>

</body>

</html>
